name: Bug report
description: Report a structural, script, validation, or documentation bug
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, files, client, model, and version where relevant.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
    validations:
      required: true
