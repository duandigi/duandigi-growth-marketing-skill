name: Skill feedback
description: Suggest a skill improvement based on a real use case or failure
title: "[Skill feedback]: "
labels: [skill-feedback]
body:
  - type: input
    id: skill
    attributes:
      label: Skill name
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: Task and context
      description: Remove personal, confidential, and client-identifying information.
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Better behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or eval
      description: Why would the change improve reliability?
    validations:
      required: true
