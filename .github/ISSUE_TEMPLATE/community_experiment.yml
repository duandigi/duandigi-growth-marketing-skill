name: Community experiment result
description: Share a baseline-versus-skill evaluation, including mixed or negative results
title: "[Experiment result]: "
labels: [benchmark]
body:
  - type: input
    id: skill
    attributes:
      label: Skill tested
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Model, client, and version
    validations:
      required: true
  - type: textarea
    id: method
    attributes:
      label: Method
      description: Describe prompt, files, baseline, skill run, randomization, and graders.
    validations:
      required: true
  - type: textarea
    id: scores
    attributes:
      label: Results and scorecard
    validations:
      required: true
  - type: textarea
    id: failures
    attributes:
      label: Failures, regressions, or limitations
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Reproducible artifacts
      description: Link to anonymized prompts, outputs, and data where possible.
